name: zenith

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  training-endpoint:
    name: python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync

      - name: Run training script
        # We use 'uv run' to ensure the script uses the environment created by 'uv sync'
        run: uv run train